apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow

name: Process Large Configuration

on:
  workflow_call:
    inputs:
      config:
        type: string
        required: true
        description: Large JSON configuration
      environment:
        type: string
        required: false
        default: "dev"

jobs:
  validate:
    steps:
      - name: Show config size
        uses: docker://alpine:3.19
        run: |
          echo "Environment: ${{ inputs.environment }}"
          CONFIG_SIZE=${#CONFIG_INPUT}
          echo "Config size: $CONFIG_SIZE bytes ($(echo "scale=1; $CONFIG_SIZE/1024" | bc) KB)"
          echo "First 100 chars: ${CONFIG_INPUT:0:100}..."
        env:
          CONFIG_INPUT: ${{ inputs.config }}

      - name: Parse and validate JSON
        uses: docker://alpine:3.19
        run: |
          apk add --no-cache jq bc
          echo "$CONFIG_INPUT" | jq '.' > /tmp/config.json
          KEYS_COUNT=$(jq 'keys | length' /tmp/config.json)
          echo "✅ Valid JSON with $KEYS_COUNT top-level keys"

          # Check if it's a large config (exceeds Tekton 4KB limit)
          CONFIG_SIZE=${#CONFIG_INPUT}
          if [ "$CONFIG_SIZE" -gt 4096 ]; then
            echo "✅ Config size ($CONFIG_SIZE bytes) exceeds Tekton 4KB limit"
          fi
        env:
          CONFIG_INPUT: ${{ inputs.config }}

  process:
    needs: validate
    steps:
      - name: Process configuration
        uses: docker://alpine:3.19
        run: |
          apk add --no-cache jq
          echo "Processing large configuration..."
          DESC=$(echo "$CONFIG_INPUT" | jq -r '.metadata.description // "No description"')
          echo "Description: $DESC"

          # Count features
          FEATURE_COUNT=$(echo "$CONFIG_INPUT" | jq '.settings.feature_flags | length // 0')
          echo "Feature flags: $FEATURE_COUNT"

          echo "✅ Reusable workflow successfully processed large input!"
        env:
          CONFIG_INPUT: ${{ inputs.config }}
