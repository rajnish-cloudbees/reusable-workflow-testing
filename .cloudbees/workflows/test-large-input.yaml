apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow

name: Test Large Input Handling

on:
  workflow_dispatch:

jobs:
  test-5kb-input:
    steps:
      - name: Generate large config
        id: generate
        uses: docker://python:3.11-alpine
        run: |
          # Generate a ~5KB JSON config
          python3 -c '
          import json

          config = {
            "metadata": {
              "description": "Large configuration object for testing",
              "version": "1.0.0",
              "timestamp": "2026-03-13T10:00:00Z"
            },
            "settings": {
              "feature_flags": {}
            }
          }

          # Add 100 feature flags to exceed 4KB
          for i in range(1, 101):
            config["settings"]["feature_flags"][f"feature_{i}"] = {
              "enabled": True,
              "description": "This is a test feature flag with a long description to increase size. Lorem ipsum dolor sit amet, consectetur adipiscing elit.",
              "rollout_percentage": 100,
              "tags": ["test", "large-input", "reusable-workflow"]
            }

          json_str = json.dumps(config, indent=2)
          print(f"Generated config size: {len(json_str)} bytes")

          # Write to output
          with open("large-config.json", "w") as f:
            f.write(json_str)
          '

          # Set output for next step
          echo "config<<EOF" >> $CLOUDBEES_OUTPUTS/config
          cat large-config.json >> $CLOUDBEES_OUTPUTS/config
          echo "EOF" >> $CLOUDBEES_OUTPUTS/config

  call-reusable:
    needs: test-5kb-input
    uses: ./.cloudbees/workflows/process-config.yaml
    with:
      config: ${{ needs.test-5kb-input.outputs.config }}
      environment: production

  test-10kb-input:
    needs: call-reusable
    steps:
      - name: Generate 10KB config
        id: generate
        uses: docker://python:3.11-alpine
        run: |
          # Generate ~10KB config
          python3 -c '
          import json

          config = {
            "metadata": {
              "description": "Extremely large configuration for stress testing",
              "version": "2.0.0"
            },
            "data": {}
          }

          # Add 200 entries to create ~10KB
          for i in range(1, 201):
            config["data"][f"entry_{i}"] = {
              "value": f"This is entry {i} with padding text to increase size. The quick brown fox jumps over the lazy dog. Pack my box with five dozen liquor jugs.",
              "metadata": {
                "created": "2026-03-13",
                "author": "test",
                "tags": ["tag1", "tag2", "tag3"]
              }
            }

          json_str = json.dumps(config, indent=2)
          print(f"Generated config size: {len(json_str)} bytes")

          with open("huge-config.json", "w") as f:
            f.write(json_str)
          '

          echo "config<<EOF" >> $CLOUDBEES_OUTPUTS/config
          cat huge-config.json >> $CLOUDBEES_OUTPUTS/config
          echo "EOF" >> $CLOUDBEES_OUTPUTS/config

  call-reusable-large:
    needs: test-10kb-input
    uses: ./.cloudbees/workflows/process-config.yaml
    with:
      config: ${{ needs.test-10kb-input.outputs.config }}
      environment: staging
