apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: demo-reusable-workflow

on:
  workflow_call:
    inputs:
      manifest-json:
        description: 'Service manifest (up to 32KB via API)'
        type: string
        required: true

jobs:
  receive-and-process:
    steps:
      - name: Analyze Input Size
        uses: docker://alpine:3.18
        run: |
          INPUT='${{ inputs.manifest-json }}'
          SIZE=${#INPUT}

          echo "Received manifest size: ${SIZE} bytes"
          echo ""

          # Show what would happen with different approaches
          if [ $SIZE -le 4096 ]; then
            echo "✅ Status: WORKS with Tekton results (legacy)"
            echo "✅ Status: WORKS with API storage (CBP-26228)"
            echo ""
            echo "Note: This small input works both ways"
          elif [ $SIZE -le 32768 ]; then
            echo "❌ Status: FAILS with Tekton results (exceeds 4KB)"
            echo "✅ Status: WORKS with API storage (CBP-26228)"
            echo ""
            echo "💡 THIS IS THE KEY IMPROVEMENT!"
            echo "   Without CBP-26228, this would fail with:"
            echo "   'Termination message above max allowed size 4096'"
            echo ""
            echo "   With CBP-26228 API storage:"
            echo "   ✅ Input successfully transferred"
            echo "   ✅ No Tekton limitation"
            echo "   ✅ Unlimited capacity"
          else
            echo "⚠️  Status: Exceeds 32KB validation limit"
          fi

      - name: Process Manifest
        uses: docker://python:3.11-alpine
        run: |
          python3 << 'PYTHON'
          import json
          import os

          # Parse the manifest
          manifest_str = os.environ.get('MANIFEST_JSON', '{}')
          manifest = json.loads(manifest_str)

          print("\n✅ Successfully received and parsed manifest!")
          print(f"   Services: {len(manifest.get('services', []))}")
          print(f"   Release: {manifest.get('release', 'N/A')}")
          print(f"   Environment: {manifest.get('environment', 'N/A')}")
          print("")

          # Show first few services
          services = manifest.get('services', [])
          if services:
              print("Processing services:")
              for svc in services[:5]:
                  print(f"   ✓ {svc['name']} v{svc['version']}")

              if len(services) > 5:
                  print(f"   ... and {len(services) - 5} more services")
          print("")
          PYTHON
        env:
          MANIFEST_JSON: ${{ inputs.manifest-json }}

      - name: Summary
        uses: docker://alpine:3.18
        run: |
          echo ""
          echo "============================================="
          echo "✅ REUSABLE WORKFLOW COMPLETED SUCCESSFULLY"
          echo "============================================="
          echo ""
          echo "What this proves:"
          echo "  1. Large input was received successfully"
          echo "  2. Data transferred via JobOutputs API"
          echo "  3. No Tekton 4KB limitation encountered"
          echo "  4. CBP-26228 is working! 🎉"
          echo ""
