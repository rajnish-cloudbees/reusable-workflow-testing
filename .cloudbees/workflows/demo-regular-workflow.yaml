apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: demo-cbp-20940-validation

on:
  workflow_dispatch:
    inputs:
      deployment-manifest:
        description: 'Service deployment manifest (paste JSON from test-data/manifest-*.json)'
        type: string
        required: true

jobs:
  validate-and-process:
    steps:
      - name: Show CBP-20940 Achievement
        uses: docker://alpine:3.18
        run: |
          SIZE=$(echo -n '${{ inputs.deployment-manifest }}' | wc -c)

          echo "=========================================="
          echo "CloudBees Platform: Large Input Support"
          echo "=========================================="
          echo ""
          echo "✅ THIS WORKFLOW IS RUNNING!"
          echo ""
          echo "Manifest size: ${SIZE} bytes ($(echo "scale=1; ${SIZE}/1024" | bc) KB)"
          echo ""

          if [ $SIZE -le 32768 ]; then
            echo "✅ STATUS: Input accepted (within 32KB limit)"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "CBP-20940: Input Validation Increase"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "Achievement:"
            echo "  • Previous validation limit: 4KB (4,096 bytes)"
            echo "  • New validation limit: 32KB (32,768 bytes)"
            echo "  • Capacity increase: 8x"
            echo ""
            echo "What this enables:"
            echo "  ✓ Large deployment manifests"
            echo "  ✓ Complex configuration files"
            echo "  ✓ Comprehensive test data"
            echo "  ✓ Realistic workflow inputs"
            echo ""
            echo "This ${SIZE}-byte input is now accepted by"
            echo "the platform, enabling more powerful workflows."

          else
            echo "❌ STATUS: Input rejected (exceeds 32KB limit)"
            echo ""
            echo "Boundary: 32KB validation limit (32,768 bytes)"
            echo "  • Input size: ${SIZE} bytes"
            echo "  • Exceeds limit by: $((SIZE - 32768)) bytes"
            echo ""
            echo "The 32KB limit provides reasonable capacity"
            echo "while preventing excessive input sizes."
            echo ""
            echo "⚠️  Note: If you see this workflow running,"
            echo "   validation may not be properly enforced."
          fi

      - name: Process Manifest
        uses: docker://python:3.11-alpine
        run: |
          python3 << 'PYTHON'
          import json
          import os

          manifest_str = os.environ.get('MANIFEST', '{}')
          manifest = json.loads(manifest_str)

          print("\n" + "="*50)
          print("Processing Deployment Manifest")
          print("="*50 + "\n")

          print(f"✅ Successfully parsed manifest")
          print(f"   Release: {manifest.get('release', 'N/A')}")
          print(f"   Environment: {manifest.get('environment', 'N/A')}")
          print(f"   Description: {manifest.get('description', 'N/A')}")
          print()

          services = manifest.get('services', [])
          print(f"Services: {len(services)} total")
          print()

          if services:
              print("First 5 services:")
              for i, svc in enumerate(services[:5], 1):
                  print(f"   {i}. {svc['name']} v{svc['version']}")
                  print(f"      Repository: {svc['repository']}")
                  print(f"      Port: {svc['port']}, Replicas: {svc['replicas']}")

              if len(services) > 5:
                  print(f"\n   ... and {len(services) - 5} more services")

          print()
          PYTHON
        env:
          MANIFEST: ${{ inputs.deployment-manifest }}

      - name: Demo Summary
        uses: docker://alpine:3.18
        run: |
          SIZE=$(echo -n '${{ inputs.deployment-manifest }}' | wc -c)

          echo ""
          echo "=========================================="
          echo "✅ DEMO COMPLETED SUCCESSFULLY"
          echo "=========================================="
          echo ""
          echo "What this demonstrated:"
          echo "  1. ✅ Input passed 32KB validation at submission"
          echo "  2. ✅ Workflow received full ${SIZE}-byte manifest"
          echo "  3. ✅ Data processed successfully"
          echo ""
          echo "CBP-20940 Impact:"
          echo "  • Users can submit larger workflow inputs"
          echo "  • 8x increase in validation capacity (4KB → 32KB)"
          echo "  • Enables real-world deployment scenarios"
          echo ""
