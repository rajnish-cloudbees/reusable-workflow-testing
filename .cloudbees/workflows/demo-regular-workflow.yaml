apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: demo-regular-workflow


on:
  workflow_dispatch:
    inputs:
      test-size:
        description: 'Test scenario'
        type: choice
        options:
          - small-4kb
          - medium-16kb
          - large-30kb
        required: true
        default: medium-16kb

jobs:
  demo-regular:
    steps:
      - name: Generate Test Data
        uses: docker://python:3.11-alpine
        run: |
          python3 << 'PYTHON'
          import json

          # Determine size based on input
          size = "${{ inputs.test-size }}"

          if size == "small-4kb":
              service_count = 10
              desc = "Small manifest (~3KB) - baseline test"
          elif size == "medium-16kb":
              service_count = 45
              desc = "Medium manifest (~10KB) - demonstrates CBP-20940"
          else:  # large-30kb
              service_count = 75
              desc = "Large manifest (~22KB) - near 32KB validation limit"

          # Generate services
          services = []
          for i in range(1, service_count + 1):
              services.append({
                  "name": f"service-{i}",
                  "version": f"1.0.{i}",
                  "repository": f"github.com/company/service-{i}",
                  "port": 8000 + i,
                  "replicas": 3,
                  "resources": {"cpu": "500m", "memory": "512Mi"}
              })

          manifest = {
              "release": "1.0.0",
              "environment": "production",
              "description": desc,
              "services": services
          }

          # Write to file
          with open('/tmp/manifest.json', 'w') as f:
              json.dump(manifest, f, separators=(',', ':'))

          # Show size
          import os
          size = os.path.getsize('/tmp/manifest.json')
          print(f"Generated manifest: {size} bytes")
          PYTHON

      - name: Validate Manifest Size
        uses: docker://alpine:3.18
        run: |
          SIZE=$(wc -c < /tmp/manifest.json)

          echo "========================================="
          echo "REGULAR WORKFLOW: Large Input Demo"
          echo "========================================="
          echo ""
          echo "Test Size: ${{ inputs.test-size }}"
          echo "Manifest: ${SIZE} bytes"
          echo ""

          if [ "$SIZE" -le 4096 ]; then
            echo "📊 Status: Under 4KB (old limit)"
            echo "   ✅ Would work before CBP-20940"
          elif [ "$SIZE" -le 32768 ]; then
            echo "📊 Status: ${SIZE} bytes (between 4KB-32KB)"
            echo "   ❌ Would FAIL before CBP-20940 (4KB limit)"
            echo "   ✅ WORKS after CBP-20940 (32KB limit)"
            echo ""
            echo "💡 This demonstrates CBP-20940 improvement!"
          else
            echo "📊 Status: Exceeds 32KB validation limit"
            echo "   ❌ Would fail validation"
          fi

      - name: Process Manifest
        uses: docker://python:3.11-alpine
        run: |
          python3 << 'PYTHON'
          import json

          with open('/tmp/manifest.json', 'r') as f:
              manifest = json.load(f)

          print("\n✅ Successfully processed manifest!")
          print(f"   Services: {len(manifest['services'])}")
          print(f"   Release: {manifest['release']}")
          print(f"   Environment: {manifest['environment']}")
          print("")
          print("First 3 services:")
          for svc in manifest['services'][:3]:
              print(f"   • {svc['name']} v{svc['version']}")

          if len(manifest['services']) > 3:
              print(f"   ... and {len(manifest['services']) - 3} more")

          print("")
          print("✅ Regular workflow completed successfully!")
          print("✅ CBP-20940 validation (32KB limit) is working!")
          PYTHON

